name: Deploy to Prod

# Trigger on push to main branch only
on:
  push:
    branches:
      - main

jobs:
  deploy-prod:
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    
    # Define a strategy to deploy all bundles
    strategy:
      matrix:
        bundle:
          - data_ingestion
      max-parallel: 1

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v5

      # Step 2: Install Databricks CLI
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks version

      # Step 3: Validate each bundle
      - name: Validate ${{ matrix.bundle }}
        working-directory: ${{ matrix.bundle }}
        run: databricks bundle validate -t prod

      # Step 4: Deploy each bundle
      - name: Deploy ${{ matrix.bundle }} to Prod
        working-directory: ${{ matrix.bundle }}
        run: databricks bundle deploy -t prod